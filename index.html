<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Голосовой ввод</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        #output { width: 80%; min-height: 100px; border: 1px solid #ccc; padding: 15px; margin-top: 20px; border-radius: 8px; }
        .active { background-color: #ff4d4d; color: white; } /* Стиль для активной кнопки */
        button { padding: 10px 20px; cursor: pointer; font-size: 16px; border-radius: 5px; border: none; background-color: #007bff; color: white; }
    </style>
</head>
<body>

    <button id="start-btn">Включить микрофон</button>
    <div id="output">Ваш текст появится здесь...</div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
    alert("Ваш браузер не поддерживает распознавание речи.");
} else {
    const recognition = new SpeechRecognition();
    const btn = document.getElementById('start-btn');
    const output = document.getElementById('output');

    recognition.lang = 'ru-RU';
    recognition.interimResults = true;
    recognition.continuous = true;

    let isRecognizing = false;

    btn.addEventListener('click', () => {
        if (isRecognizing) {
            recognition.stop();
        } else {
            recognition.start();
        }
    });

    recognition.onstart = () => {
        isRecognizing = true;
        btn.textContent = 'Остановить запись';
        btn.classList.add('active');
    };

    recognition.onresult = (event) => {
    let finalTranscript = ''; // Для утвержденного текста
    let interimTranscript = ''; // Для текущего (меняющегося) слова

    for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
            finalTranscript += transcript;
        } else {
            interimTranscript += transcript;
        }
    }

    // Выводим текст. Промежуточный текст можно подсветить серым для красоты
    output.innerHTML = finalTranscript + '<i style="color: gray;">' + interimTranscript + '</i>';
};


    recognition.onend = () => {
        isRecognizing = false;
        btn.textContent = 'Включить микрофон';
        btn.classList.remove('active');
    };

    recognition.onerror = (event) => {
        console.error('Ошибка:', event.error);
        isRecognizing = false;
    };
}

    </script>
</body>
</html>
