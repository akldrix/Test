<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Голосовой ввод</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        #output { width: 80%; min-height: 100px; border: 1px solid #ccc; padding: 15px; margin-top: 20px; border-radius: 8px; }
        .active { background-color: #ff4d4d; color: white; } /* Стиль для активной кнопки */
        button { padding: 10px 20px; cursor: pointer; font-size: 16px; border-radius: 5px; border: none; background-color: #007bff; color: white; }
    </style>
</head>
<body>

    <button id="start-btn">Включить микрофон</button>
    <div id="output">Ваш текст появится здесь...</div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
    alert("Ваш браузер не поддерживает распознавание речи.");
} else {
    const recognition = new SpeechRecognition();
    const btn = document.getElementById('start-btn');
    const output = document.getElementById('output');

    recognition.lang = 'ru-RU';
    recognition.interimResults = true;
    recognition.continuous = true;

    let isRecognizing = false;

    btn.addEventListener('click', () => {
        if (isRecognizing) {
            recognition.stop();
        } else {
            recognition.start();
        }
    });

    recognition.onstart = () => {
        isRecognizing = true;
        btn.textContent = 'Остановить запись';
        btn.classList.add('active');
    };

    recognition.onresult = (event) => {
        let finalTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript;
            }
        }
        // Если текст пустой (начало работы), очищаем заглушку
        if (output.textContent === 'Ваш текст появится здесь...') output.textContent = '';
        
        // Добавляем только новые финальные фразы
        if (finalTranscript) output.textContent += finalTranscript + ' ';
    };

    recognition.onend = () => {
        isRecognizing = false;
        btn.textContent = 'Включить микрофон';
        btn.classList.remove('active');
    };

    recognition.onerror = (event) => {
        console.error('Ошибка:', event.error);
        isRecognizing = false;
    };
}

    </script>
</body>
</html>
