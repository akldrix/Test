<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Голосовой ввод</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background-color: #f4f4f9; }
        #output { 
            width: 80%; 
            min-height: 150px; 
            border: 1px solid #ccc; 
            padding: 15px; 
            margin-top: 20px; 
            border-radius: 8px; 
            background: white;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        button { 
            padding: 12px 24px; 
            cursor: pointer; 
            font-size: 16px; 
            border-radius: 5px; 
            border: none; 
            background-color: #007bff; 
            color: white; 
            transition: background 0.3s;
        }
        button.active { background-color: #ff4d4d; }
        .interim { color: #aaa; }
    </style>
</head>
<body>

    <button id="start-btn">Включить микрофон</button>
    <div id="output">Нажмите кнопку и говорите...</div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            alert("Ваш браузер не поддерживает распознавание речи. Используйте Chrome или Edge.");
        } else {
            const recognition = new SpeechRecognition();
            const btn = document.getElementById('start-btn');
            const output = document.getElementById('output');

            recognition.lang = 'ru-RU';
            recognition.interimResults = true;
            recognition.continuous = true;

            let isRecognizing = false;

            btn.addEventListener('click', () => {
                if (isRecognizing) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            });

            recognition.onstart = () => {
                isRecognizing = true;
                btn.textContent = 'Остановить запись';
                btn.classList.add('active');
                if (output.textContent === 'Нажмите кнопку и говорите...') {
                    output.textContent = '';
                }
            };

            recognition.onresult = (event) => {
                let finalTranscript = '';
                let interimTranscript = '';

                // Проходим по ВСЕМ результатам в текущей сессии
                for (let i = 0; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }

                // Отображаем: готовый текст + серый "черновик"
                output.innerHTML = finalTranscript + '<span class="interim">' + interimTranscript + '</span>';
            };

            recognition.onend = () => {
                isRecognizing = false;
                btn.textContent = 'Включить микрофон';
                btn.classList.remove('active');
            };

            recognition.onerror = (event) => {
                console.error('Ошибка распознавания:', event.error);
                if (event.error === 'not-allowed') alert('Доступ к микрофону заблокирован.');
                isRecognizing = false;
                btn.textContent = 'Включить микрофон';
                btn.classList.remove('active');
            };
        }
    </script>
</body>
</html>
